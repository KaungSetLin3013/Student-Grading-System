<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Grading System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --light: #f8f9fa;
            --dark: #212529;
            --success: #4cc9f0;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f5f7fa;
            color: var(--dark);
            line-height: 1.6;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 25px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 600;
        }
        
        .form-container {
            padding: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #495057;
        }
        
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ced4da;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2);
        }
        
        .marks-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        
        .marks-table th {
            background-color: #f1f3f5;
            padding: 12px;
            text-align: left;
            font-weight: 500;
        }
        
        .marks-table td {
            padding: 12px;
            border-bottom: 1px solid #e9ecef;
        }
        
        .marks-input {
            width: 80px;
            text-align: center;
            padding: 8px 10px;
        }
        
        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.3s;
            display: block;
            margin: 30px auto 0;
        }
        
        button:hover {
            background: var(--secondary);
        }
        
        #results {
            margin-top: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 8px;
            display: none;
            animation: fadeIn 0.5s ease;
        }
        
        #results h2 {
            color: var(--primary);
            margin-bottom: 15px;
            font-size: 22px;
        }
        
        .result-item {
            display: flex;
            margin-bottom: 10px;
        }
        
        .result-label {
            font-weight: 500;
            min-width: 120px;
            color: #495057;
        }
        
        .result-value {
            font-weight: 600;
        }
        
        .grade-display {
            display: inline-block;
            padding: 5px 15px;
            background: var(--success);
            color: white;
            border-radius: 20px;
            font-weight: 600;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Student Grading System</h1>
        </div>
        
        <div class="form-container">
            <form id="studentForm">
                <div class="form-group">
                    <label for="name">Student Name</label>
                    <input type="text" id="name" placeholder="Enter student name" required>
                </div>
                
                <div class="form-group">
                    <label for="id">Student ID</label>
                    <input type="number" id="id" placeholder="Enter student ID" required>
                </div>
                
                <table class="marks-table">
                    <thead>
                        <tr>
                            <th>Subject</th>
                            <th>Marks (0-100)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Myanmar</td>
                            <td><input type="number" id="myanmar" class="marks-input" min="0" max="100" required></td>
                        </tr>
                        <tr>
                            <td>English</td>
                            <td><input type="number" id="english" class="marks-input" min="0" max="100" required></td>
                        </tr>
                        <tr>
                            <td>Maths</td>
                            <td><input type="number" id="maths" class="marks-input" min="0" max="100" required></td>
                        </tr>
                        <tr>
                            <td>Science</td>
                            <td><input type="number" id="science" class="marks-input" min="0" max="100" required></td>
                        </tr>
                        <tr>
                            <td>Geography</td>
                            <td><input type="number" id="geography" class="marks-input" min="0" max="100" required></td>
                        </tr>
                        <tr>
                            <td>History</td>
                            <td><input type="number" id="history" class="marks-input" min="0" max="100" required></td>
                        </tr>
                    </tbody>
                </table>
                
                <button type="submit">Calculate Grade</button>
            </form>
            
            <div id="results">
                <h2>Results</h2>
                <div class="result-item">
                    <span class="result-label">Name:</span>
                    <span class="result-value" id="resultName"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">ID:</span>
                    <span class="result-value" id="resultId"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">Average Mark:</span>
                    <span class="result-value" id="resultAverage"></span>
                </div>
                <div class="result-item">
                    <span class="result-label">Grade:</span>
                    <span class="result-value"><span class="grade-display" id="resultGrade"></span></span>
                </div>
            </div>
        </div>
    </div>

    <script src="tastPass.js"></script>
    <script src="main.js"></script>
</body>

</html>
